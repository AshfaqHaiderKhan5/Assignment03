name: Linting Pipeline
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16
    - name: Install dependencies
      run: npm install
    - name: Set execute permissions for htmlhint binary
      run: chmod +x node_modules/.bin/htmlhint
    - name: Test htmlhint version
      run: ./node_modules/.bin/htmlhint --version
    - name: Lint HTML files
      run: ./node_modules/.bin/htmlhint "src/**/*.html"
    - name: Lint CSS files
      run: stylelint "styles/**/*.css"
